name: Aggiorna annunci beauty

on:
  schedule:
    # lunedi' e giovedi' alle 7:00 UTC (8:00/9:00 ora italiana a seconda dell'ora legale)
    - cron: "0 7 * * 1,4"
  workflow_dispatch: {}  # permette di lanciarlo manualmente da GitHub

permissions:
  contents: write  # serve per poter committare data/jobs.json aggiornato

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Installa il browser richiesto da Playwright
        run: playwright install --with-deps chromium

      - name: Esegui la pipeline
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: python main.py

      - name: Commit dei risultati aggiornati
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/jobs.json
          git diff --quiet --cached || git commit -m "Aggiorna annunci $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
